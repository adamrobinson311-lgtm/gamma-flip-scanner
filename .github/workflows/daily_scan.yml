name: Daily Gamma Flip Scan

on:
  schedule:
    # Runs at 4:30 PM ET (21:30 UTC) Monday–Friday, after market close
    - cron: '30 21 * * 1-5'
  workflow_dispatch:  # allows manual trigger from GitHub UI

jobs:
  scan:
    runs-on: ubuntu-latest
    timeout-minutes: 60  # full S&P 500 scan can take ~20-30 min

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install yfinance pandas numpy scipy lxml requests

      - name: Run gamma scanner
        run: |
          python gamma_scanner.py \
            --output gamma_results.json \
            --workers 8
        # If yfinance rate-limits you, reduce --workers to 4

      - name: Verify output
        run: |
          python - <<'EOF'
          import json, sys
          with open("gamma_results.json") as f:
              data = json.load(f)
          count = len(data.get("results", []))
          print(f"✓ Scan complete: {count} stocks processed")
          if count < 10:
              print("ERROR: Too few results — something may have gone wrong")
              sys.exit(1)
          EOF

      - name: Commit updated results
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add gamma_results.json
          # Only commit if the file actually changed
          git diff --cached --quiet || git commit -m "🔄 Gamma scan: $(date -u +'%Y-%m-%d %H:%M UTC')"
          git push
